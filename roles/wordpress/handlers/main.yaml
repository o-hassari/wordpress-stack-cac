---
- name: "start apache"
  service:
    name: "{{ item }}"
    state: started
    enabled: yes
  become: true
  loop:
    - apache2

- name: "restart apache2"
  service:
    name: "{{ item }}"
    state: restarted
    enabled: yes
  become: true
  loop:
    - apache2

- name: "reload apache2"
  service:
    name: "{{ item }}"
    state: reloaded
    enabled: yes
  become: true
  loop:
    - apache2