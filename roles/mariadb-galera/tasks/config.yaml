---
- name: Create .my.cnf file with root credentials
  copy:
    dest: "/root/.my.cnf"
    content: |
      [client]

    mode: '0600'
  become: true
  notify: stop mysql
  
- name: "Create DB wordpress"
  mysql_db:
    name: "{{ wordpress_database }}"
    state: present
    # login_user: root
    # login_password: password
    login_unix_socket: /var/run/mysqld/mysqld.sock
  become: true
  # when: ansible_play_batch[0] == inventory_hostname

- name: "INSTALL DB - Create user"
  mysql_user:
    name: "{{ wordpress_user }}"
    password: "{{ wordpress_password }}"
    priv: "{{ wordpress_database }}.*:ALL"
    host: "%"
    # login_user: root
    # login_password: password
    login_unix_socket: /var/run/mysqld/mysqld.sock
    state: present
  become: true
  # when: ansible_play_batch[0] == inventory_hostname
  


- name: Set bind-address in MySQL configuration
  lineinfile:
    path: /etc/mysql/my.cnf  # Path to MySQL configuration file
    regexp: '^bind-address\s*='
    line: 'bind-address = 0.0.0.0'
  become: true
  notify: restart mysql

#####
- name: Install NFS client package for backup system
  apt:
    name: nfs-common
    state: present

- name: Create NFS export directories
  file:
    path: "/mnt/backups"
    state: directory

- name: Mount NFS share for backups
  mount:
    path: /mnt/backups
    src: "{{ nfs_server_ip }}:/nfs4/backups"
    fstype: nfs
    opts: defaults
    state: mounted

- name: Create DUMP bash file
  template:
    src: "templates/mysqldump_backup.sh.j2"
    dest: "/usr/local/mysqldump_backup.sh"
    mode: '0755'

- name: Create daily backup cron job
  cron:
    name: "Daily MySQL backup"
    minute: "0"
    hour: "2"
    job: "/usr/local/mysqldump_backup.sh"


