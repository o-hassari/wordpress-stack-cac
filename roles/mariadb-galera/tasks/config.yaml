- name: config | Configuring Galera Cluster
  template:
    src: etc/mysql/conf.d/galera.cnf.j2
    dest: /etc/mysql/conf.d/galera.cnf
    owner: root
    group: root
    mode: u=rw,g=r,o=r
  become: true
  # notify: stop mysql

- meta: flush_handlers





