---
- name: Configuring Cluster DB
  hosts: db_servers
  gather_facts: true
  become: true
  vars:
    inventory_group_name: db_servers
    wsrep_cluster_name: "Galera_Cluster"
    wordpress_database: wordpress
    wordpress_user: wordpress
    wordpress_password: wordpress
  tasks:
    - name: Include ansible mariadb-galera
      include_role:
        name: mariadb-galera